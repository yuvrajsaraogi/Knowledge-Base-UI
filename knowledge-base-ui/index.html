<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Base</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#4F46E5',
            brandDark: '#1E1B4B',
            navBg: '#1a1545',
            sidebarBg: '#FAFAFA',
            cardBorder: '#E5E7EB',
            textPrimary: '#111827',
            textSecondary: '#6B7280',
            textMuted: '#9CA3AF',
            activeBg: '#EEF2FF',
            activeText: '#4F46E5',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #fff; color: #111827; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    *:focus-visible { outline: 2px solid #4F46E5; outline-offset: 1px; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ───────────────────────────── DATA ───────────────────────────── */
    const knowledgeBaseItems = [
      { id: 1, title: 'Test', description: 'Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry\'s standard dummy', createdOn: '14/07/2025' },
      { id: 2, title: 'Test', description: 'Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry\'s standard dummy', createdOn: '14/07/2025' },
      { id: 3, title: 'Test', description: 'Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry\'s standard dummy', createdOn: '14/07/2025' },
      { id: 4, title: 'Test', description: 'Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry\'s standard dummy', createdOn: '14/07/2025' },
      { id: 5, title: 'Test', description: 'Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry\'s standard dummy', createdOn: '14/07/2025' },
      { id: 6, title: 'Test', description: 'Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry\'s standard dummy', createdOn: '14/07/2025' },
    ];

    /* ─────────────── SIDEBAR NAV ITEMS (matches Figma) ──────────── */
    const sidebarSections = [
      {
        label: 'MY PROJECTS',
        items: [
          { name: 'Agents', icon: 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z' },
          { name: 'AI Models', icon: 'M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z' },
          { name: 'Library', icon: 'M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z' },
        ],
      },
      {
        label: 'ORCHESTRATOR',
        items: [
          { name: 'Published', icon: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' },
          { name: 'Machines', icon: 'M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01' },
          { name: 'Queues', icon: 'M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10' },
          { name: 'Triggers', icon: 'M13 10V3L4 14h7v7l9-11h-7z' },
          { name: 'Jobs', icon: 'M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z' },
          { name: 'Executions', icon: 'M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15' },
          { name: 'Vault', icon: 'M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z' },
          { name: 'Knowledge Base', icon: 'M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10', active: true },
          { name: 'Key Store', icon: 'M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z' },
        ],
      },
      {
        label: 'ADMIN',
        items: [
          { name: 'Tenant', icon: 'M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4' },
          { name: 'Integrations', icon: 'M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z' },
        ],
      },
    ];

    /* ───────────────────────── TOP NAVBAR ─────────────────────────── */
    function TopNav() {
      return (
        <nav className="h-14 bg-navBg flex items-center justify-between px-4 fixed top-0 left-0 right-0 z-50">
          {/* Left: logo + workspace */}
          <div className="flex items-center gap-3">
            {/* Logo icon */}
            <div className="flex items-center gap-2">
              <svg className="w-7 h-7 text-white" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" fill="none" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              <span className="text-white font-bold text-lg">Worcspace</span>
            </div>
            {/* Workspace selector */}
            <button className="flex items-center gap-1 bg-brand text-white text-xs font-medium px-3 py-1.5 rounded-md">
              Worcspace 1
              <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
              </svg>
            </button>
          </div>

          {/* Center: search */}
          <div className="hidden md:flex items-center">
            <div className="relative">
              <div className="flex items-center bg-white/10 rounded-lg px-3 py-1.5 min-w-[300px]">
                <svg className="w-4 h-4 text-white/50 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <span className="text-white/50 text-sm">Search...</span>
                <span className="ml-auto text-white/30 text-xs border border-white/20 rounded px-1.5 py-0.5">⌘K</span>
              </div>
            </div>
          </div>

          {/* Right: bell + avatar */}
          <div className="flex items-center gap-4">
            <button className="text-white/70 hover:text-white transition-colors">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
              </svg>
            </button>
            <div className="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center text-white text-xs font-bold">
              OK
            </div>
          </div>
        </nav>
      );
    }

    /* ──────────────────────── LEFT SIDEBAR ────────────────────────── */
    function Sidebar({ isOpen, onClose }) {
      return (
        <React.Fragment>
          {/* Mobile overlay */}
          {isOpen && (
            <div className="fixed inset-0 bg-black/30 z-30 lg:hidden" onClick={onClose} />
          )}
          <aside className={`fixed top-14 left-0 bottom-0 w-52 bg-white border-r border-gray-200 z-40 overflow-y-auto transition-transform duration-200 ${isOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
            <div className="py-4">
              {sidebarSections.map((section) => (
                <div key={section.label} className="mb-2">
                  <p className="px-5 py-2 text-[10px] font-semibold text-textMuted tracking-wider uppercase">
                    {section.label}
                  </p>
                  {section.items.map((item) => (
                    <button
                      key={item.name}
                      className={`w-full flex items-center gap-3 px-5 py-2 text-[13px] font-medium transition-colors relative ${
                        item.active
                          ? 'text-activeText bg-activeBg'
                          : 'text-textSecondary hover:text-textPrimary hover:bg-gray-50'
                      }`}
                    >
                      {item.active && (
                        <div className="absolute left-0 top-1 bottom-1 w-[3px] bg-brand rounded-r" />
                      )}
                      <svg className="w-[18px] h-[18px] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth={1.8}>
                        <path strokeLinecap="round" strokeLinejoin="round" d={item.icon} />
                      </svg>
                      <span>{item.name}</span>
                    </button>
                  ))}
                </div>
              ))}
            </div>
          </aside>
        </React.Fragment>
      );
    }

    /* ──────────────────── KNOWLEDGE BASE CARD ─────────────────────── */
    function KBCard({ title, description, createdOn }) {
      const [menuOpen, setMenuOpen] = useState(false);
      return (
        <div className="bg-white border border-cardBorder rounded-lg p-5 flex flex-col justify-between relative">
          {/* Header row */}
          <div>
            <div className="flex items-start justify-between mb-3">
              <h3 className="text-[15px] font-semibold text-textPrimary">{title}</h3>
              <button
                onClick={() => setMenuOpen(!menuOpen)}
                className="p-1 -mr-1 text-textMuted hover:text-textPrimary rounded transition-colors"
              >
                <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                  <circle cx="12" cy="5" r="1.5" />
                  <circle cx="12" cy="12" r="1.5" />
                  <circle cx="12" cy="19" r="1.5" />
                </svg>
              </button>
            </div>
            {/* Description */}
            <p className="text-[13px] text-textSecondary leading-relaxed">
              {description}
            </p>
          </div>
          {/* Footer */}
          <p className="text-xs text-textMuted mt-6 pt-3 border-t border-gray-100">
            Created On: {createdOn}
          </p>
        </div>
      );
    }

    /* ─────────────────────── PAGINATION ───────────────────────────── */
    function Pagination({ totalRows }) {
      return (
        <div className="flex items-center justify-between px-6 py-3 border-t border-gray-200 bg-white text-sm text-textSecondary">
          <span className="text-[13px]">{totalRows} rows</span>
          <div className="flex items-center gap-6">
            <div className="flex items-center gap-2">
              <span className="text-[13px]">Rows per page</span>
              <select className="border border-gray-300 rounded px-2 py-1 text-xs bg-white text-textPrimary focus:outline-none focus:ring-1 focus:ring-brand">
                <option>10</option>
                <option>25</option>
                <option>50</option>
              </select>
            </div>
            <span className="text-[13px]">page 1 of 1</span>
            <div className="flex items-center gap-1">
              {['«', '‹', '›', '»'].map((arrow, i) => (
                <button key={i} className="w-8 h-8 flex items-center justify-center border border-gray-300 rounded text-xs text-textMuted hover:bg-gray-50 transition-colors">
                  {arrow}
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ──────────────── SLIDE-IN DRAWER (Create New) ──────────────── */
    function Modal({ isOpen, onClose }) {
      const drawerRef = useRef(null);

      useEffect(() => {
        const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
        if (isOpen) {
          document.addEventListener('keydown', handleEsc);
          document.body.style.overflow = 'hidden';
        }
        return () => {
          document.removeEventListener('keydown', handleEsc);
          document.body.style.overflow = '';
        };
      }, [isOpen, onClose]);

      return (
        <React.Fragment>
          {/* Backdrop */}
          {isOpen && (
            <div className="fixed inset-0 bg-black/30 z-[90] animate-[fadeIn_0.2s_ease-out]" onClick={onClose} />
          )}

          {/* Drawer panel — slides in from the right */}
          <div
            ref={drawerRef}
            className={`fixed top-0 right-0 bottom-0 z-[100] w-full max-w-sm bg-white shadow-2xl flex flex-col transition-transform duration-300 ease-in-out ${
              isOpen ? 'translate-x-0' : 'translate-x-full'
            }`}
            role="dialog"
            aria-modal="true"
            aria-labelledby="drawer-title"
          >
            {/* Header */}
            <div className="flex items-start justify-between px-6 pt-6 pb-4">
              <div>
                <h2 id="drawer-title" className="text-[17px] font-semibold text-textPrimary">Create New Knowledge Base</h2>
                <p className="text-[13px] text-textSecondary mt-1">Best for quick answers from documents, websites and text files.</p>
              </div>
              <button onClick={onClose} className="p-1 -mr-1 mt-0.5 text-textMuted hover:text-textPrimary transition-colors rounded" aria-label="Close">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>

            {/* Body — scrollable */}
            <div className="flex-1 overflow-y-auto px-6 pb-6 space-y-5">
              {/* Name field */}
              <div>
                <label htmlFor="kb-name" className="block text-sm font-medium text-textPrimary mb-1.5">
                  Name <span className="text-textSecondary font-normal">(Cannot be edited later)</span><span className="text-red-500">*</span>
                </label>
                <input
                  id="kb-name"
                  type="text"
                  placeholder="Name"
                  className="w-full px-3 py-2.5 border border-gray-300 rounded-md text-sm text-textPrimary placeholder:text-textMuted focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand transition-all"
                />
              </div>

              {/* Description field */}
              <div>
                <label htmlFor="kb-description" className="block text-sm font-medium text-textPrimary mb-1.5">
                  Description
                </label>
                <textarea
                  id="kb-description"
                  rows={3}
                  placeholder="Description"
                  className="w-full px-3 py-2.5 border border-gray-300 rounded-md text-sm text-textPrimary placeholder:text-textMuted focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand transition-all resize-none"
                />
              </div>

              {/* Vector Store dropdown */}
              <div>
                <label htmlFor="kb-vector-store" className="block text-sm font-medium text-textPrimary mb-1.5">
                  Vector Store<span className="text-red-500">*</span>
                </label>
                <div className="relative">
                  <select
                    id="kb-vector-store"
                    className="w-full px-3 py-2.5 border border-gray-300 rounded-md text-sm text-textPrimary bg-white focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand transition-all appearance-none pr-8"
                  >
                    <option>Qdrant</option>
                    <option>Pinecone</option>
                    <option>Weaviate</option>
                    <option>Milvus</option>
                  </select>
                  <svg className="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-textMuted pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                  </svg>
                </div>
              </div>

              {/* LLM Embedding Model dropdown */}
              <div>
                <label htmlFor="kb-embedding-model" className="block text-sm font-medium text-textPrimary mb-1.5">
                  LLM Embedding Model<span className="text-red-500">*</span>
                </label>
                <div className="relative">
                  <select
                    id="kb-embedding-model"
                    className="w-full px-3 py-2.5 border border-gray-300 rounded-md text-sm text-textPrimary bg-white focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand transition-all appearance-none pr-8"
                  >
                    <option>text-embedding-ada-002</option>
                    <option>text-embedding-3-small</option>
                    <option>text-embedding-3-large</option>
                  </select>
                  <svg className="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-textMuted pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                  </svg>
                </div>
              </div>
            </div>

            {/* Footer — pinned to bottom */}
            <div className="px-6 py-4 border-t border-gray-100 flex justify-end">
              <button className="px-5 py-2 text-sm font-medium text-white bg-brand rounded-md hover:bg-brand/90 shadow-sm transition-all">
                Create
              </button>
            </div>
          </div>
        </React.Fragment>
      );
    }

    /* ──────────────────────── MAIN APP ────────────────────────────── */
    function App() {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      return (
        <div className="min-h-screen bg-gray-50">
          <TopNav />
          <Sidebar isOpen={isSidebarOpen} onClose={() => setIsSidebarOpen(false)} />

          {/* Main content area */}
          <div className="lg:ml-52 pt-14 min-h-screen flex flex-col">
            {/* Page header */}
            <div className="flex items-center justify-between px-6 py-5 bg-white border-b border-gray-200">
              <h1 className="text-xl font-semibold text-textPrimary">Knowledge Base</h1>
              <div className="flex items-center gap-3">
                {/* Search */}
                <div className="relative hidden sm:block">
                  <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-textMuted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                  </svg>
                  <input
                    type="text"
                    placeholder="Search..."
                    className="pl-9 pr-3 py-2 border border-gray-300 rounded-md text-sm text-textPrimary placeholder:text-textMuted focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand w-44"
                  />
                </div>
                {/* Mobile hamburger */}
                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="lg:hidden p-2 text-textSecondary hover:bg-gray-100 rounded">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                  </svg>
                </button>
                {/* Create New button */}
                <button
                  onClick={() => setIsModalOpen(true)}
                  className="flex items-center gap-1.5 bg-brand text-white text-sm font-medium px-4 py-2 rounded-md hover:bg-brand/90 shadow-sm transition-all"
                >
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                  </svg>
                  Create New
                </button>
              </div>
            </div>

            {/* Cards grid */}
            <div className="flex-1 p-6">
              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                {knowledgeBaseItems.map((item) => (
                  <KBCard key={item.id} title={item.title} description={item.description} createdOn={item.createdOn} />
                ))}
              </div>
            </div>

            {/* Pagination footer */}
            <Pagination totalRows={knowledgeBaseItems.length} />
          </div>

          {/* Modal */}
          <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} />
        </div>
      );
    }

    /* ─────────────────────── RENDER ───────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    @keyframes scaleIn {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</body>
</html>
